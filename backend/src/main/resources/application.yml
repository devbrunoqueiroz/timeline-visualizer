spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/chronicle}
    username: ${DB_USER:chronicle}
    password: ${DB_PASSWORD:chronicle}
    hikari:
      initialization-fail-timeout: 60000
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

chronicle:
  api:
    prefix: /api/v1
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
  jwt:
    secret: ${JWT_SECRET:chronicle-dev-secret-key-must-be-at-least-32-chars-long}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
